services:
  grid-bot:
    build: .
    container_name: newsetka
    restart: always
    env_file:
      - .env
    volumes:
      # Mount .env with API keys (create this file before running)
      - ./.env:/app/.env:ro
      # Mount config.py — edit without rebuilding, just restart
      - ./config.py:/app/config.py:ro
